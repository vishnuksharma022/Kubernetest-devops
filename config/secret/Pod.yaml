apiVersion: v1
kind: Pod
metadata:
  name: mssql-pod
spec:
  containers:
  - name: mssql
    image: nginx
    env:
      - name: DB_USERNAME
        valueFrom:
          secretKeyRef:
            name: db-secrets
            key: DB_USERNAME
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: db-secrets
            key: DB_PASSWORD