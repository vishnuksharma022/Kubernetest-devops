apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: web-application
  name: web-application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-application
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: web-application
    spec:
      containers:
      - image: nginx
        name: nginx
        volumeMounts:
        - mountPath: "/var/www/html"
          name: web-application
      volumes:
      - name: web-application
        persistentVolumeClaim:
          claimName: nfs-pvc
